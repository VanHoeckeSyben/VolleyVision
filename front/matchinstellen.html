<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyVision</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
        integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO"
        crossorigin="anonymous"></script>
    <script src="script/matchinstellen.js"></script>
    <script src="script/app.js"></script>
</head>

<body class="js-matchinstellen">
    <header class="c-header">
        <div class="c-header__inner">
            <h1 class="c-header__titel"><a class="c-header__titel" href="index.html">VolleyVision</a></h1>
            <button class="c-header__menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="#E6F1FA" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu">
                    <path d="M4 5h16" />
                    <path d="M4 12h16" />
                    <path d="M4 19h16" />
                </svg></button>
            <nav class="c-nav">
                <ul class="c-nav__list">
                    <li class="c-nav__listitem c-nav__listitem--home"><a class="c-nav__link js-navlink"
                            href="index.html" data-navlink="Home">Home</a></li>
                    <li class="c-nav__listitem c-nav__listitem--match"><a
                            class="c-nav__link js-navlink c-nav__actief js-livematchmenu" href="matchinstellen.html"
                            data-navlink="Match">Match</a></li>
                    <li class="c-nav__listitem c-nav__listitem--spelers"><a class="c-nav__link js-navlink"
                            href="spelerslijst.html" data-navlink="Spelers">Spelers</a>
                    </li>
                    <li class="c-nav__listitem c-nav__listitem--stats"><a class="c-nav__link js-navlink"
                            href="statistieken.html" data-navlink="Stats">Stats</a>
                    </li>
                    <li class="c-nav__listitem c-nav__listitem--instellingen"><a class="c-nav__link js-navlink"
                            href="instellingen.html" data-navlink="Instellingen">Instellingen</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="c-main o-container">
        <section class="c-welkom">
            <h2 class="c-welkom__titel">Nieuwe Match</h2>
            <p class="c-welkom__ondertitel">Stel de spelers opstelling op</p>
        </section>

        <div class="c-matchinstellingen">
            <div class="c-volleybalveld">
                <div class="c-volleybalveld__positie1 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="1" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>1</option>
                    </select>
                </div>
                <div class="c-volleybalveld__positie2 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="2" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>2</option>
                    </select>
                </div>
                <div class="c-volleybalveld__positie3 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="3" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>3</option>
                    </select>
                </div>
                <div class="c-volleybalveld__positie4 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="4" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>4</option>
                    </select>
                </div>
                <div class="c-volleybalveld__positie5 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="5" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>5</option>
                    </select>
                </div>
                <div class="c-volleybalveld__positie6 c-volleybalveld__positie">
                    <label class="c-volleybajlveld__label" for="veldpositie"></label>
                    <select class="c-volleybalveld__input js-veldpositie" data-positie="6" id="veldpositie"
                        name="veldpositie">
                        <option value="" disabled selected>6</option>
                    </select>
                </div>
            </div>

            <div class="c-opties">
                <div class="c-opslag">
                    <p class="c-opslag__titel">Opslag: <span
                            class="c-opslag__waarde js-ploeg-opslag">Tegenstander</span></p>
                    <label class="c-switch">
                        <input class="js-opslag-toggle" type="checkbox">
                        <span class="c-slider c-round"></span>
                    </label>
                </div>
                <button class="c-startmatch"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-play-icon lucide-play">
                        <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z" />
                    </svg>Live Match Starten</button>
            </div>
        </div>

    </main>

</body>

</html>
